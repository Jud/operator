name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-server:
    name: MCP Server (lint, format, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  swift:
    name: Swift (build, lint, format)
    runs-on: macos-26
    defaults:
      run:
        working-directory: Operator
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH for private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HARNESS_DEPLOY_KEY }}

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint --strict

      - name: Install swift-format
        run: brew install swift-format

      - name: Check formatting
        run: |
          find Sources Tests -name '*.swift' \
            ! -path 'Sources/Tokenizer/*' \
            ! -path 'Sources/QwenTokenizerRust/*' \
            -print0 | xargs -0 swift-format lint --strict
